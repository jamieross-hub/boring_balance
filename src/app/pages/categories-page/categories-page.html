<section class="flex flex-col gap-4">
  @if (isLoading()) {
    <z-skeleton class="h-12 w-full"></z-skeleton>
    <z-skeleton class="h-60 w-full"></z-skeleton>
  } @else if (loadError(); as loadError) {
    <div class="rounded-md border border-destructive/30 bg-destructive/5 p-4 text-sm text-destructive">
      Failed to load categories: {{ loadError }}
    </div>
  } @else {
    <app-data-table
      [data]="categories()"
      [structure]="categoryTableStructure"
      [title]="'nav.items.categories'"
      description="categories.table.description"
      emptyMessage="categories.table.emptyMessage"
      [showEmpty]="true"
      [bordered]="true"
      [striped]="false"
      [hoverable]="true"
      [selectable]="false"
      [hasActionColumn]="false"
      [showPagination]="true"
      [currentPage]="page()"
      [totalPages]="pageCount()"
      [pageSize]="pageSize()"
      [pageSizeOptions]="pageSizeOptions"
      [maxVisiblePages]="5"
      [pageSizeLabel]="'transactions.pagination.rowsPerPage' | translate"
      [showPageSizeSelector]="true"
      [showTopPagination]="true"
      (pageChange)="onPageChange($event)"
      (pageSizeChange)="onPageSizeChange($event)"
    ></app-data-table>
  }
</section>
