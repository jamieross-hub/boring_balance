<section class="flex flex-col gap-4">
  <z-segmented [zDefaultValue]="activeView()" zAriaLabel="Transaction sections" (zChange)="onViewChange($event)">
    <z-segmented-item value="common" [label]="'transactions.view.commonTransactions' | translate" />
    <z-segmented-item value="transfers" [label]="'transactions.view.transfers' | translate" />
  </z-segmented>

  @if (activeView() === 'common') {
    <div class="animate-in fade-in-0 slide-in-from-left-2 duration-200 ease-out space-y-4">
      <app-transactions-table-section></app-transactions-table-section>
    </div>
  } @else {
    <div class="animate-in fade-in-0 slide-in-from-right-2 duration-200 ease-out space-y-4">
      <app-transfers-table-section></app-transfers-table-section>
    </div>
  }
</section>
