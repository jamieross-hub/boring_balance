<section class="grid grid-cols-1 gap-4 lg:grid-cols-2">
  <app-base-card zTitle="Monthly spending trend">
    <app-line-chart
      class="mt-3"
      [labels]="monthlySpendingLabels"
      [series]="monthlySpendingSeries"
      [showArea]="false"
      [stacked]="false"
      [showPointsOnHoverOnly]="true"
      [dimOthersOnFocus]="true"
      [blurOpacity]="0.25"
      [lineOpacity]="0.7"
      [pointOpacity]="1"
      [areaOpacity]="0.5"
      height="15rem"
      [pointSymbol]="'circle'"
      [pointSize]="10"
      [pointBorderWidth]="1"
      [blendPointBorder]="true"
    ></app-line-chart>
  </app-base-card>

  <app-base-card zTitle="Monthly totals by category">
    <app-bar-chart
      class="mt-3"
      [labels]="monthlySpendingLabels"
      [series]="monthlyTotalsBarSeries"
      [dimOthersOnFocus]="true"
      [blurOpacity]="0.25"
      height="20rem"
      [axisPointerType]="'shadow'"
      [orientation]="'vertical'"
      [cornerRadius]="2.5"
    ></app-bar-chart>
  </app-base-card>

  <app-base-card zTitle="Monthly distribution">
    <app-pie-chart
      class="mt-3"
      [donut]="false"
      [data]="monthlyTotalsPieData"
      [showLabels]="true"
      [dimOthersOnFocus]="true"
      [blurOpacity]="0.25"
      [scaleOnFocus]="true"
      [scaleSize]="10"
      height="20rem"
    ></app-pie-chart>
  </app-base-card>

  <app-base-card zTitle="Budget health radar">
    <app-radar-chart
      class="mt-3"
      [indicators]="budgetHealthIndicators"
      [series]="budgetHealthSeries"
      [dimOthersOnFocus]="true"
      [blurOpacity]="0.10"
      [splitNumber]="5"
      [shape]="'polygon'"
      [showLegend]="true"
      height="20rem"
    ></app-radar-chart>
  </app-base-card>

  <app-base-card zTitle="Cashflow Sankey">
    <app-sankey-chart
      class="mt-3"
      [nodes]="cashflowSankeyNodes"
      [links]="cashflowSankeyLinks"
      [showLabels]="true"
      [dimOthersOnFocus]="true"
      [blurOpacity]="0.18"
      [lineOpacity]="0.36"
      [curveness]="0.45"
      [nodeWidth]="16"
      [nodeGap]="10"
      height="20rem"
    ></app-sankey-chart>
  </app-base-card>

  <app-base-card zTitle="Daily activity calendar">
    <app-calendar-chart
      class="mt-3"
      [data]="dailyActivityCalendarData"
      [range]="dailyActivityCalendarRange"
      [showVisualMap]="true"
      [orientation]="'vertical'"
      [showYearLabel]="false"
      [themeColor]="'chart-3'"
      [variant]="'points'"
      [pointScale]="2.4"
      height="20rem"
    ></app-calendar-chart>
  </app-base-card>
</section>
