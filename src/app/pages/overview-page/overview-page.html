<section class="grid grid-cols-1 gap-4">
  <app-base-card zTitle="Income, expenses and profit">
    @if (isMonthlyTotalsLoading()) {
      <div class="mt-3 flex h-80 items-center justify-center">
        <div class="flex flex-col items-center gap-3 text-muted-foreground">
          <z-loader zSize="lg" />
          <p class="text-sm">Loading analytics...</p>
        </div>
      </div>
    } @else if (monthlyTotalsLoadError(); as loadError) {
      <div class="mt-3 rounded-md border border-destructive/30 bg-destructive/5 p-4 text-sm text-destructive">
        Failed to load analytics: {{ loadError }}
      </div>
    } @else if (monthlyTotalsLabels.length === 0) {
      <div class="mt-3 rounded-md border border-border/60 bg-muted/40 p-4 text-sm text-muted-foreground">
        No analytics data available for the selected filters.
      </div>
    } @else {
      <app-bar-chart
        class="mt-3"
        [labels]="monthlyTotalsLabels"
        [series]="monthlyTotalsBarSeries"
        [dimOthersOnFocus]="true"
        [blurOpacity]="0.25"
        height="15rem"
        [axisPointerType]="'shadow'"
        [orientation]="'vertical'"
        [cornerRadius]="2.5"
      ></app-bar-chart>
    }
  </app-base-card>
</section>
