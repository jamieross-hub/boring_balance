<section class="grid min-h-full gap-4 lg:min-h-[calc(100dvh-(7.5rem+var(--app-shell-header-offset)))] lg:grid-cols-[17.5rem_minmax(0,1fr)] lg:items-stretch">
  <div class="min-h-0 lg:sticky lg:top-0 lg:self-start lg:h-[calc(100dvh-(7.5rem+var(--app-shell-header-offset)))] lg:overflow-hidden">
      <app-contextual-sidebar
        [items]="navItems"
        [activeKey]="activeKey()"
        (keySelected)="onSectionSelected($event)"
      />
  </div>

  <div class="flex min-w-0 min-h-0 flex-col gap-4">
    <app-settings-section-header
      [titleKey]="activeItem().label"
      [descriptionKey]="activeItem().description"
    />

    @switch (activeKey()) {
      @case ('general') {
        <app-general-section />
      }
      @case ('backups') {
        <app-backups-section />
      }
      @case ('sync') {
        <app-sync-section />
      }
      @case ('export') {
        <app-export-section />
      }
      @case ('data') {
        <app-data-section />
      }
      @case ('about') {
        <app-about-section class="min-h-0 flex-1" />
      }
    }
  </div>
</section>
