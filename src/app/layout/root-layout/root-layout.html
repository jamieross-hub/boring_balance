<z-layout class="h-full overflow-hidden">
  <app-header></app-header>

  <z-layout class="relative min-h-0 flex-1" zDirection="horizontal">
    @if (showSidebarOverlay()) {
      <button
        type="button"
        class="absolute inset-0 z-40 bg-black/30 md:hidden"
        aria-label="Close sidebar"
        (click)="closeSidebarOverlay()"
      ></button>
    }

    <app-sidebar
      [menuSections]="menuSections"
      [isSmallScreen]="isSmallScreen()"
      [sidebarCollapsed]="sidebarCollapsed()"
      (sidebarCollapsedChange)="setSidebarCollapsed($event)"
    ></app-sidebar>

    <z-layout class="min-w-0 flex-1">
      <app-breadcrumb
        [sidebarCollapsed]="sidebarCollapsed()"
        (sidebarToggle)="toggleSidebar()"
      ></app-breadcrumb>

      <z-content class="min-h-0">
        <ng-content />
      </z-content>

      <app-footer></app-footer>
    </z-layout>
  </z-layout>
</z-layout>
