<a
  href="#main-content"
  class="sr-only focus:not-sr-only focus:absolute focus:left-4 focus:top-4 focus:z-9999 focus:rounded-md focus:bg-background focus:px-4 focus:py-2 focus:text-sm focus:font-medium focus:ring-2 focus:ring-ring focus:ring-offset-2"
>{{ 'common.skipToContent' | translate }}</a>

<z-layout class="h-full overflow-hidden" [style.--app-shell-header-offset]="headerOffset()">
  @if (isFullscreen()) {
    <app-header></app-header>
  }

  <z-layout class="relative min-h-0 flex-1" zDirection="horizontal">
    @if (showSidebarOverlay()) {
      <button
        type="button"
        class="absolute inset-0 z-40 bg-black/30 dark:bg-white/10"
        [attr.aria-label]="'sidebar.close' | translate"
        (click)="closeSidebarOverlay()"
      ></button>
    }

    <app-sidebar
      [menuSections]="menuSections"
      [isSmallScreen]="isSmallScreen()"
      [sidebarCollapsed]="sidebarCollapsed()"
      (sidebarCollapsedChange)="setSidebarCollapsed($event)"
    ></app-sidebar>

    <z-layout
      class="min-w-0 flex-1"
      [attr.inert]="showSidebarOverlay() ? '' : null"
      [attr.aria-hidden]="showSidebarOverlay() ? 'true' : null"
    >
      <app-toolbar
        [sidebarCollapsed]="sidebarCollapsed()"
        [title]="toolbarTitle()"
        [itemActions]="toolbarItemActions()"
        [itemNavigation]="toolbarItemNavigation()"
        (sidebarToggle)="toggleSidebar()"
      ></app-toolbar>

      <z-content id="main-content" class="min-h-0">
        <ng-content />
      </z-content>

    </z-layout>
  </z-layout>
</z-layout>
