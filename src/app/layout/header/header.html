<z-header class="justify-between">
  <div class="flex items-center gap-3">
    <div
      class="flex size-8 items-center justify-center rounded-lg bg-primary text-xs font-semibold text-primary-foreground"
    >
      ET
    </div>
    <div class="flex flex-col">
      <span class="text-sm font-semibold leading-none">Expense Tracker</span>
      <span class="text-xs text-muted-foreground">Personal Budget</span>
    </div>
  </div>

  <button
    z-button
    type="button"
    zType="ghost"
    zSize="sm"
    zShape="circle"
    [attr.aria-label]="darkMode.themeMode() === EDarkModes.DARK ? 'Activate light mode' : 'Activate dark mode'"
    [attr.title]="darkMode.themeMode() === EDarkModes.DARK ? 'Light mode' : 'Dark mode'"
    (click)="toggleTheme($event)"
  >
    <z-icon [zType]="darkMode.themeMode() === EDarkModes.DARK ? 'sun' : 'moon'" class="size-4" />
  </button>
</z-header>
